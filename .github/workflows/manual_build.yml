name: Build Release

on:
  workflow_dispatch:
    inputs:
      config-board:
        description: '开发板型号'
        required: true
        default: 'avaota-a1'
        type: choice
        options:
          - avaota-a1
          - avaota-c1
          - yuzuki-chameleon
      config-distro:
        description: '发行版'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - focal      # Ubuntu 20.04
          - jammy      # Ubuntu 22.04  
          - noble      # Ubuntu 24.04
          - bullseye   # Debian 11
          - bookworm   # Debian 12
      config-distro-type:
        description: '桌面环境'
        required: true
        default: 'gnome'
        type: choice
        options:
          - cli
          - xfce
          - gnome
          - kde
          - lxqt
      config-kernel-target:
        description: '内核版本'
        required: true
        default: 'bsp'
        type: choice
        options:
          - bsp
          - mainline-lts
          - mainline-latest
      config-release_ver:
        description: '版本号'
        required: true
        default: '0.3.0.4'

permissions:
  contents: write

jobs:
  # 第一步：编译内核包
  build-kernel:
    uses: ./.github/workflows/Build-AvaotaOS-Kernel.yaml
    with:
      config-board: ${{ github.event.inputs.config-board }}
      config-kernel-target: ${{ github.event.inputs.config-kernel-target }}
    secrets: inherit

  # 第二步：编译完整系统镜像（依赖内核包）
  build-image:
    needs: build-kernel
    uses: ./.github/workflows/Build-AvaotaOS.yaml
    with:
      config-board: ${{ github.event.inputs.config-board }}
      config-distro: ${{ github.event.inputs.config-distro }}
      config-distro-type: ${{ github.event.inputs.config-distro-type }}
      config-kernel-target: ${{ github.event.inputs.config-kernel-target }}
      config-release_id: ''  # 留空，让后续步骤统一上传
      config-release_ver: ${{ github.event.inputs.config-release_ver }}
    secrets: inherit

  # 第三步：上传到 Release
  create-release:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载编译产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.config-release_ver }}-${{ github.event.inputs.config-board }}-${{ github.event.inputs.config-distro }}-${{ github.event.inputs.config-distro-type }}-${{ github.run_number }}
          name: "AvaotaOS ${{ github.event.inputs.config-release_ver }} - ${{ github.event.inputs.config-board }} - ${{ github.event.inputs.config-distro }} (${{ github.event.inputs.config-distro-type }})"
          body: |
            自动编译的 AvaotaOS 镜像
            
            - 开发板: ${{ github.event.inputs.config-board }}
            - 发行版: ${{ github.event.inputs.config-distro }}
            - 桌面环境: ${{ github.event.inputs.config-distro-type }}
            - 内核: ${{ github.event.inputs.config-kernel-target }}
            - 版本号: ${{ github.event.inputs.config-release_ver }}
          files: artifacts/**/*.img.xz*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
