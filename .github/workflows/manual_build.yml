name: Build Release

on:
  workflow_dispatch:
    inputs:
      config-board:
        description: '开发板型号'
        required: true
        default: 'avaota-a1'
        type: choice
        options:
          - avaota-a1
          - avaota-c1
          - yuzuki-chameleon
      config-distro:
        description: '发行版'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - focal
          - jammy
          - noble
          - bullseye
          - bookworm
      config-distro-type:
        description: '桌面环境'
        required: true
        default: 'gnome'
        type: choice
        options:
          - cli
          - xfce
          - gnome
          - kde
          - lxqt
      config-kernel-target:
        description: '内核版本'
        required: true
        default: 'bsp'
        type: choice
        options:
          - bsp
          - mainline-lts
          - mainline-latest
      config-release_ver:
        description: '版本号'
        required: true
        default: '0.3.0.4'

permissions:
  contents: write

jobs:
  build-kernel:
    uses: ./.github/workflows/Build-AvaotaOS-Kernel.yaml
    with:
      config-board: ${{ github.event.inputs.config-board }}
      config-kernel-target: ${{ github.event.inputs.config-kernel-target }}
    secrets: inherit

  build-image:
    needs: build-kernel
    uses: ./.github/workflows/Build-AvaotaOS.yaml
    with:
      config-board: ${{ github.event.inputs.config-board }}
      config-distro: ${{ github.event.inputs.config-distro }}
      config-distro-type: ${{ github.event.inputs.config-distro-type }}
      config-kernel-target: ${{ github.event.inputs.config-kernel-target }}
      config-release_id: ''
      config-release_ver: ${{ github.event.inputs.config-release_ver }}
    secrets: inherit

  create-release:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载编译产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.config-release_ver }}-${{ github.event.inputs.config-board }}-${{ github.event.inputs.config-distro }}-${{ github.event.inputs.config-distro-type }}-${{ github.run_number }}
          name: "AvaotaOS ${{ github.event.inputs.config-release_ver }} - ${{ github.event.inputs.config-board }} - ${{ github.event.inputs.config-distro }} (${{ github.event.inputs.config-distro-type }})"
          body: |
            自动编译的 AvaotaOS 镜像
            
            - 开发板: ${{ github.event.inputs.config-board }}
            - 发行版: ${{ github.event.inputs.config-distro }}
            - 桌面环境: ${{ github.event.inputs.config-distro-type }}
            - 内核: ${{ github.event.inputs.config-kernel-target }}
          files: artifacts/**/*.img.xz*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
