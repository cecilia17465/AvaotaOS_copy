name: Manual Build Release

on:
  workflow_dispatch:
    inputs:
      config-board:
        description: '开发板型号'
        required: true
        default: 'avaota-a1'
        type: choice
        options:
          - avaota-a1
          - avaota-c1
          - yuzuki-chameleon
      config-distro:
        description: '发行版'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - focal
          - jammy
          - noble
          - bullseye
          - bookworm
      config-distro-type:
        description: '桌面环境'
        required: true
        default: 'gnome'
        type: choice
        options:
          - cli
          - xfce
          - gnome
          - kde
          - lxqt
      config-kernel-target:
        description: '内核版本'
        required: true
        default: 'bsp'
        type: choice
        options:
          - bsp
          - mainline-lts
          - mainline-latest
      config-release_ver:
        description: '版本号'
        required: true
        default: '0.3.0.4'

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.last-release.outputs.id }}
      release_ver: ${{ steps.last-release.outputs.release }}
    steps:
      - id: last-release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: ${{ github.repository }}

  build-kernel:
    needs: prepare_release
    uses: ./.github/workflows/Build-AvaotaOS-Kernel.yaml
    with:
      config-board: ${{ github.event.inputs.config-board }}
      config-kernel-target: ${{ github.event.inputs.config-kernel-target }}
      config-release_id: ${{ needs.prepare_release.outputs.release_id }}
      config-release_ver: ${{ github.event.inputs.config-release_ver }}
    secrets: inherit

  build-image:
    needs: [prepare_release, build-kernel]
    uses: ./.github/workflows/Build-AvaotaOS.yaml
    with:
      config-board: ${{ github.event.inputs.config-board }}
      config-distro: ${{ github.event.inputs.config-distro }}
      config-distro-type: ${{ github.event.inputs.config-distro-type }}
      config-kernel-target: ${{ github.event.inputs.config-kernel-target }}
      config-release_id: ${{ needs.prepare_release.outputs.release_id }}
      config-release_ver: ${{ github.event.inputs.config-release_ver }}
    secrets: inherit
